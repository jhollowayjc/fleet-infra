---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system 
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: capi-operator
  namespace: capi-system 
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/cluster-api-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capi-operator
  namespace: capi-system 
spec:
  interval: 10m
  chart:
    spec:
      chart: cluster-api-operator
      version: '0.19.0'
      sourceRef:
        kind: HelmRepository
        name: capi-operator 
      interval: 10m
  values:
    core:
      cluster-api:
        version: v1.10.1
